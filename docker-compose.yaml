version: "3.9"

services:
  app:
    build: .
    container_name: weather_app
    environment:
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30