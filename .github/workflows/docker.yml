name: Build and Push Docker Image

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/weather-app:latest \
                       -t ${{ secrets.DOCKERHUB_USERNAME }}/weather-app:${{ github.event.release.tag_name }} .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/weather-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/weather-app:${{ github.event.release.tag_name }}